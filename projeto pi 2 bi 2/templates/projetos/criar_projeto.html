<h1>Criar Projeto</h1>

<form method="POST">

    <input
        type="text"
        name="nome"
        placeholder="Nome do Projeto"
        required
    >

    <br><br>

    <textarea
        name="descricao"
        placeholder="Descrição"
    ></textarea>

    <br><br>

    <button type="submit">
        Criar Projeto
    </button>

</form>
